<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" rx="18" fill="url(#grad)"/>
  <!-- Building/pillars -->
  <rect x="14" y="44" width="8" height="20" rx="1" fill="white" opacity="0.9"/>
  <rect x="26" y="38" width="8" height="26" rx="1" fill="white" opacity="0.9"/>
  <rect x="38" y="32" width="8" height="32" rx="1" fill="white"/>
  <rect x="50" y="38" width="8" height="26" rx="1" fill="white" opacity="0.9"/>
  <rect x="62" y="44" width="8" height="20" rx="1" fill="white" opacity="0.9"/>
  <!-- Base line -->
